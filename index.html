<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Railway AI Predictor</title>
  <img src="https://cdn.pixabay.com/photo/2016/11/29/03/53/train-1869729_1280.jpg"
     class="img-fluid rounded mb-3 shadow"
     style="max-height:150px;">

  <!-- Bootstrap (for pro design) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
      url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34');
      background-size: cover;
      background-position: center;
      color: white;
    }

    .card {
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
    }

    .btn-custom {
      background: #ffcc00;
      color: black;
      font-weight: bold;
    }
  </style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  
  <div class="card text-center shadow-lg" style="width: 350px;">

    <h2>🚆 Railway Delay Predictor</h2>

    <img src="https://cdn.pixabay.com/photo/2016/11/29/03/53/train-1869729_1280.jpg"
         class="img-fluid rounded mb-3">

    <label>Train Number</label>
    <input type="text" id="trainNumber" class="form-control mb-3">

    <label>Weather</label>
    <select id="weather" class="form-control mb-3">
      <option value="clear">Clear</option>
      <option value="rain">Rain</option>
      <option value="fog">Fog</option>
    </select>

    <button class="btn btn-custom w-100" onclick="predict()">Predict Delay</button>

    <h4 class="mt-3" id="result"></h4>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
